<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>訂餐系統</title>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, onSnapshot, arrayUnion, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';

const app = initializeApp({
  apiKey: "AIzaSyA_tFbY1Cshh-u2qum2fg3fWijfHtYwBE0",
  authDomain: "order-e395c.firebaseapp.com",
  projectId: "order-e395c",
  storageBucket: "order-e395c.firebasestorage.app",
  messagingSenderId: "77302517511",
  appId: "1:77302517511:web:2248241cbad0bb999cbfa2"
});
const db = getFirestore(app);

let currentOrder = null;
let unsub = null;

function $(id){ return document.getElementById(id); }

function showTab(tab){
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.toggle('active', p.id === 'tab-' + tab));
  if(tab === 'accounts') loadAccounts();
  if(tab === 'history') loadHistory();
  if(tab === 'stores') loadStores();
}

function showSection(sec){
  document.querySelectorAll('.order-section').forEach(s => s.classList.toggle('active', s.id === 'sec-' + sec));
}

async function loadStoreButtons(){
  const snap = await getDocs(collection(db, 'stores'));
  const wrap = $('store-btns');
  wrap.innerHTML = '';
  snap.docs.forEach(d => {
    const s = d.data();
    const btn = document.createElement('button');
    btn.className = 'btn-sm';
    btn.textContent = s.name;
    btn.onclick = () => loadStoreToForm(s);
    wrap.appendChild(btn);
  });
}

function loadStoreToForm(s){
  $('new-store-name').value = s.name;
  const container = $('new-menu-items');
  container.innerHTML = '';
  s.menuItems.forEach(m => addMenuRow(m.name, m.price));
}

function addMenuRow(name='', price=''){
  const container = $('new-menu-items');
  const div = document.createElement('div');
  div.className = 'menu-row';
  div.innerHTML = `<input class="inp" placeholder="品項名稱" value="${name}"><input class="inp price-inp" placeholder="價格" type="number" value="${price}"><button class="btn-sm" onclick="this.parentNode.remove()">刪除</button>`;
  container.appendChild(div);
}

async function createOrder(){
  const storeName = $('new-store-name').value.trim();
  const deadline = $('new-deadline').value;
  const payer = $('new-payer').value.trim();
  const rows = document.querySelectorAll('#new-menu-items .menu-row');
  const menuItems = [];
  rows.forEach(r => {
    const name = r.querySelector('input').value.trim();
    const price = Number(r.querySelector('.price-inp').value);
    if(name && price) menuItems.push({ name, price });
  });
  if(!storeName || !payer) return alert('請填寫店家名稱和付款人');
  if(menuItems.length === 0) return alert('請至少新增一個菜單品項');
  $('create-btn').textContent = '建立中...';
  $('create-btn').disabled = true;

  // 找看看有沒有對應的店家提醒
  const storeSnap = await getDocs(collection(db, 'stores'));
  let orderHint = '';
  storeSnap.docs.forEach(d => {
    const s = d.data();
    if(s.name === storeName && s.orderHint) orderHint = s.orderHint;
  });

  const ref = await addDoc(collection(db, 'orders'), {
    storeName, deadline, payer, menuItems, orderHint, status: 'open',
    createdAt: new Date().toISOString(), entries: []
  });
  currentOrder = { id: ref.id, storeName, deadline, payer, menuItems, orderHint, status: 'open', entries: [] };
  $('create-btn').textContent = '建立訂單';
  $('create-btn').disabled = false;
  showSection('order');
  renderOrder();
  subscribeOrder();
}

function subscribeOrder(){
  if(unsub) unsub();
  if(!currentOrder) return;
  unsub = onSnapshot(doc(db, 'orders', currentOrder.id), snap => {
    if(snap.exists()){
      currentOrder = { id: snap.id, ...snap.data() };
      renderOrder();
    }
  });
}

function renderOrder(){
  if(!currentOrder){ $('no-order').style.display='block'; $('order-content').style.display='none'; return; }
  $('no-order').style.display='none';
  $('order-content').style.display='block';
  $('order-title').textContent = currentOrder.storeName;
  $('order-deadline').textContent = '截止：' + currentOrder.deadline.replace('T',' ');
  $('payer-name').textContent = currentOrder.payer;
  $('payer-name2').textContent = currentOrder.payer;

  // 點餐提醒
  const hintBox = $('order-hint-box');
  if(currentOrder.orderHint){
    hintBox.style.display = 'flex';
    $('order-hint-text').textContent = currentOrder.orderHint;
  } else {
    hintBox.style.display = 'none';
  }

  const menu = $('menu-list');
  menu.innerHTML = '';
  currentOrder.menuItems.forEach(item => {
    const key = item.name.replace(/[^a-zA-Z0-9]/g,'_');
    menu.innerHTML += `<div class="menu-item">
      <span>${item.name}</span>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="price-label">$${item.price}</span>
        <button class="qb" onclick="chg('${item.name}',-1)">−</button>
        <span id="q-${key}">0</span>
        <button class="qb" onclick="chg('${item.name}',1)">+</button>
      </div>
    </div>`;
  });

  const entries = $('entries-list');
  entries.innerHTML = '';
  if(currentOrder.entries.length === 0){
    entries.innerHTML = '<div style="color:#bbb;font-size:13px;padding:.5rem 0">還沒有人訂餐</div>';
  } else {
    currentOrder.entries.forEach((e) => {
      entries.innerHTML += `<div class="person-row">
        <div class="av">${e.name[0]}</div>
        <div style="flex:1">
          <div class="name-text">${e.name}</div>
          <div class="sub-text">${e.items.map(it=>`${it.name} x${it.qty}`).join('、')} → $${e.total}${e.note?' ・'+e.note:''}</div>
        </div>
        <span class="badge ${e.paid?'b-ok':'b-warn'}">${e.paid?'已付':'未付'}</span>
      </div>`;
    });
  }
  updateMyTotal();
}

const myQty = {};
function chg(name, delta){
  myQty[name] = Math.max(0, (myQty[name]||0) + delta);
  const key = name.replace(/[^a-zA-Z0-9]/g,'_');
  const el = document.getElementById('q-'+key);
  if(el) el.textContent = myQty[name];
  updateMyTotal();
}

function updateMyTotal(){
  if(!currentOrder) return;
  const items = Object.entries(myQty).filter(([,v])=>v>0);
  const total = items.reduce((s,[n,v])=>{
    const item = currentOrder.menuItems.find(m=>m.name===n);
    return s + (item ? item.price*v : 0);
  }, 0);
  $('my-total').textContent = '$' + total;
  const summary = $('my-summary');
  if(items.length === 0){
    summary.innerHTML = '<span style="color:#bbb">尚未選擇品項</span>';
  } else {
    summary.innerHTML = items.map(([n,v])=>{
      const item = currentOrder.menuItems.find(m=>m.name===n);
      return `<div class="summary-row"><span>${n} x${v}</span><span>$${item?item.price*v:0}</span></div>`;
    }).join('');
  }
  const name = $('my-name').value.trim();
  $('submit-btn').disabled = items.length===0 || !name;
}

async function submitOrder(){
  const name = $('my-name').value.trim();
  if(!name) return alert('請輸入名字');
  const items = Object.entries(myQty).filter(([,v])=>v>0).map(([n,v])=>{
    const item = currentOrder.menuItems.find(m=>m.name===n);
    return { name:n, qty:v, price:item.price };
  });
  if(items.length===0) return alert('請選擇品項');
  const total = items.reduce((s,it)=>s+it.price*it.qty,0);
  const entry = { name, items, note:$('my-note').value, total, paid:false, createdAt:new Date().toISOString() };
  await updateDoc(doc(db,'orders',currentOrder.id),{ entries: arrayUnion(entry) });
  $('submit-btn').textContent = '已送出！';
  $('submit-btn').disabled = true;
  Object.keys(myQty).forEach(k=>myQty[k]=0);
}

async function loadAccounts(){
  const snap = await getDocs(collection(db,'orders'));
  const orders = snap.docs.map(d=>({id:d.id,...d.data()}));
  const allEntries = orders.flatMap(o=>o.entries.map((e,i)=>({...e,orderId:o.id,entryIndex:i,storeName:o.storeName,payer:o.payer,date:o.createdAt?.slice(0,10)})));
  const people = {};
  allEntries.forEach(e=>{
    if(!people[e.name]) people[e.name]={total:0,unpaid:0};
    people[e.name].total += e.total;
    if(!e.paid) people[e.name].unpaid += e.total;
  });
  const totalSpent = Object.values(people).reduce((s,p)=>s+p.total,0);
  const totalUnpaid = Object.values(people).reduce((s,p)=>s+p.unpaid,0);
  $('stat-spent').textContent = '$'+totalSpent;
  $('stat-unpaid').textContent = '$'+totalUnpaid;
  $('stat-orders').textContent = orders.length;

  $('people-list').innerHTML = Object.entries(people).map(([name,p])=>`
    <div class="person-row">
      <div class="av">${name[0]}</div>
      <div style="flex:1"><div class="name-text">${name}</div><div class="sub-text">累積 $${p.total}・未付 $${p.unpaid}</div></div>
      ${p.unpaid===0?'<span class="badge b-ok">結清</span>':`<span class="tag-debt">欠款 $${p.unpaid}</span>`}
    </div>`).join('') || '<div style="color:#bbb;font-size:13px">尚無資料</div>';

  const unpaid = allEntries.filter(e=>!e.paid);
  $('unpaid-list').innerHTML = unpaid.length===0 ? '<div style="color:#bbb;font-size:13px">所有人都已結清</div>' :
    unpaid.map((e)=>`
    <div class="settle-row">
      <div><div style="font-size:14px">${e.name} 欠 ${e.payer}</div><div class="sub-text">${e.date} ${e.storeName}</div></div>
      <div style="text-align:right">
        <div style="font-weight:500">$${e.total}</div>
        <button class="btn-sm" style="margin-top:4px" onclick="markPaid('${e.orderId}',${e.entryIndex})">標記已還</button>
      </div>
    </div>`).join('');
}

async function markPaid(orderId, entryIndex){
  const snap = await getDocs(collection(db,'orders'));
  const orderDoc = snap.docs.find(d=>d.id===orderId);
  if(!orderDoc) return;
  const entries = [...orderDoc.data().entries];
  entries[entryIndex] = {...entries[entryIndex], paid:true};
  await updateDoc(doc(db,'orders',orderId),{entries});
  loadAccounts();
}

async function loadHistory(){
  const snap = await getDocs(query(collection(db,'orders'),orderBy('createdAt','desc')));
  const orders = snap.docs.map(d=>({id:d.id,...d.data()}));
  $('history-list').innerHTML = orders.length===0 ? '<div style="color:#bbb;font-size:13px">尚無記錄</div>' :
    orders.map(o=>{
      const total = o.entries.reduce((s,e)=>s+e.total,0);
      const allPaid = o.entries.length>0 && o.entries.every(e=>e.paid);
      return `<div class="order-hist">
        <div>
          <div style="font-weight:500">${o.storeName}</div>
          <div class="sub-text">${o.createdAt?.slice(0,10)} · ${o.entries.length} 人 · 付款人：${o.payer}</div>
        </div>
        <div style="text-align:right">
          <div style="font-weight:500">$${total}</div>
          <span class="badge ${o.status==='open'?'b-info':allPaid?'b-ok':'b-warn'}" style="margin-top:4px;display:inline-block">${o.status==='open'?'進行中':allPaid?'已完成':'未結清'}</span>
        </div>
      </div>`;
    }).join('');
}

async function loadStores(){
  const snap = await getDocs(collection(db,'stores'));
  const stores = snap.docs.map(d=>({id:d.id,...d.data()}));
  $('stores-list').innerHTML = stores.length===0 ? '<div style="color:#bbb;font-size:13px;padding-bottom:1rem">尚無店家</div>' :
    stores.map(s=>`
    <div class="store-item">
      <div style="display:flex;align-items:flex-start;gap:10px">
        <div style="flex:1">
          <div style="font-size:14px;font-weight:500">${s.name}</div>
          <div class="sub-text" style="margin-top:3px">${s.menuItems.map(m=>`${m.name} $${m.price}`).join('、')}</div>
          <div style="font-size:12px;margin-top:4px;color:#888">外送門檻：<strong style="color:#1a1a1a">${s.threshold?'$'+s.threshold:'無門檻'}</strong>${s.note?' ・'+s.note:''}</div>
          ${s.orderHint?`<div style="font-size:12px;margin-top:4px;background:#FFF3CD;color:#856404;padding:4px 8px;border-radius:6px;display:inline-block">點餐提醒：${s.orderHint}</div>`:''}
        </div>
        <button class="btn-sm" onclick="openStoreEdit('${s.id}')">編輯</button>
      </div>
    </div>`).join('');
}

async function openStoreEdit(id){
  const snap = await getDocs(collection(db,'stores'));
  const storeDoc = snap.docs.find(d=>d.id===id);
  if(!storeDoc) return;
  const s = storeDoc.data();
  $('edit-store-id').value = id;
  $('edit-store-name').value = s.name;
  $('edit-threshold').value = s.threshold || '';
  $('edit-note').value = s.note || '';
  $('edit-order-hint').value = s.orderHint || '';
  const itemsContainer = $('edit-menu-items');
  itemsContainer.innerHTML = '';
  s.menuItems.forEach(m => {
    const div = document.createElement('div');
    div.className = 'menu-row';
    div.innerHTML = `<input class="inp" placeholder="品項名稱" value="${m.name}"><input class="inp price-inp" placeholder="價格" type="number" value="${m.price}"><button class="btn-sm" onclick="this.parentNode.remove()">刪除</button>`;
    itemsContainer.appendChild(div);
  });
  $('edit-store-modal').style.display = 'flex';
}

function closeStoreEdit(){
  $('edit-store-modal').style.display = 'none';
}

function addEditMenuRow(){
  const div = document.createElement('div');
  div.className = 'menu-row';
  div.innerHTML = `<input class="inp" placeholder="品項名稱"><input class="inp price-inp" placeholder="價格" type="number"><button class="btn-sm" onclick="this.parentNode.remove()">刪除</button>`;
  $('edit-menu-items').appendChild(div);
}

async function saveStoreEdit(){
  const id = $('edit-store-id').value;
  const name = $('edit-store-name').value.trim();
  if(!name) return alert('請輸入店家名稱');
  const rows = document.querySelectorAll('#edit-menu-items .menu-row');
  const menuItems = [];
  rows.forEach(r=>{
    const n = r.querySelector('input').value.trim();
    const p = Number(r.querySelector('.price-inp').value);
    if(n && p) menuItems.push({name:n, price:p});
  });
  if(menuItems.length===0) return alert('請至少新增一個品項');
  await updateDoc(doc(db,'stores',id),{
    name,
    threshold: Number($('edit-threshold').value)||null,
    note: $('edit-note').value,
    orderHint: $('edit-order-hint').value,
    menuItems
  });
  closeStoreEdit();
  loadStores();
}

function showNewStore(show){
  $('new-store-form').style.display = show ? 'block' : 'none';
}

function addNewStoreRow(){
  const c = $('new-store-items');
  const div = document.createElement('div');
  div.className = 'menu-row';
  div.innerHTML = `<input class="inp" placeholder="品項名稱"><input class="inp price-inp" placeholder="價格" type="number"><button class="btn-sm" onclick="this.parentNode.remove()">刪除</button>`;
  c.appendChild(div);
}

async function saveNewStore(){
  const name = $('ns-name').value.trim();
  if(!name) return alert('請輸入店家名稱');
  const rows = document.querySelectorAll('#new-store-items .menu-row');
  const menuItems = [];
  rows.forEach(r=>{
    const n = r.querySelector('input').value.trim();
    const p = Number(r.querySelector('.price-inp').value);
    if(n && p) menuItems.push({name:n, price:p});
  });
  if(menuItems.length===0) return alert('請至少新增一個品項');
  await addDoc(collection(db,'stores'),{
    name, threshold: Number($('ns-threshold').value)||null,
    note: $('ns-note').value,
    orderHint: $('ns-order-hint').value,
    menuItems
  });
  $('ns-name').value=''; $('ns-threshold').value=''; $('ns-note').value=''; $('ns-order-hint').value='';
  $('new-store-items').innerHTML='';
  showNewStore(false);
  loadStores();
}

window.showTab = showTab;
window.showSection = showSection;
window.addMenuRow = addMenuRow;
window.createOrder = createOrder;
window.chg = chg;
window.updateMyTotal = updateMyTotal;
window.submitOrder = submitOrder;
window.markPaid = markPaid;
window.openStoreEdit = openStoreEdit;
window.closeStoreEdit = closeStoreEdit;
window.addEditMenuRow = addEditMenuRow;
window.saveStoreEdit = saveStoreEdit;
window.showNewStore = showNewStore;
window.addNewStoreRow = addNewStoreRow;
window.saveNewStore = saveNewStore;

document.addEventListener('DOMContentLoaded', () => {
  loadStoreButtons();
  document.getElementById('today-date').textContent = new Date().toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
  document.getElementById('new-deadline').value = new Date().toISOString().slice(0,16);
});
</script>

<body>
<div class="container">
  <div class="header">
    <div>
      <div class="header-title">訂餐系統</div>
      <div class="header-date" id="today-date"></div>
    </div>
    <button class="btn-sm" onclick="showTab('today');showSection('new');loadStoreButtons()">+ 新增訂單</button>
  </div>
  <div class="tabs">
    <button class="tab-btn active" data-tab="today" onclick="showTab('today')">今日訂單</button>
    <button class="tab-btn" data-tab="accounts" onclick="showTab('accounts')">帳務總覽</button>
    <button class="tab-btn" data-tab="history" onclick="showTab('history')">歷史記錄</button>
    <button class="tab-btn" data-tab="stores" onclick="showTab('stores')">常用店家</button>
  </div>

  <div class="tab-pane active" id="tab-today">
    <div class="order-section" id="sec-new">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:1.25rem">
        <button class="btn-sm" onclick="showSection('order')">← 返回</button>
        <span style="font-size:16px;font-weight:500">新增訂單</span>
      </div>
      <div class="card">
        <div class="sec-title">店家資訊</div>
        <div class="input-group"><label class="lbl">店家名稱</label><input class="inp" id="new-store-name" placeholder="例：八方雲集"></div>
        <div class="input-group"><label class="lbl">截止時間</label><input class="inp" id="new-deadline" type="datetime-local" style="width:220px"></div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:.5rem">
          <span style="font-size:13px;color:#888">常用店家：</span>
          <div id="store-btns" style="display:flex;gap:6px;flex-wrap:wrap"></div>
        </div>
      </div>
      <div class="card">
        <div class="sec-title">付款人</div>
        <div class="input-group"><label class="lbl">這次誰去拿餐付錢？</label><input class="inp" id="new-payer" placeholder="輸入付款人姓名" style="max-width:240px"></div>
      </div>
      <div class="card">
        <div class="sec-title">菜單品項</div>
        <div id="new-menu-items"></div>
        <button class="btn-sm" style="margin-top:4px" onclick="addMenuRow()">+ 新增品項</button>
      </div>
      <button class="btn-sm" id="create-btn" onclick="createOrder()" style="padding:10px 20px;background:#1a1a1a;color:#fff;border-color:#1a1a1a">建立訂單</button>
    </div>

    <div class="order-section active" id="sec-order">
      <div id="no-order" style="text-align:center;padding:3rem;color:#888">
        <div style="font-size:16px;margin-bottom:8px">目前沒有進行中的訂單</div>
        <div style="font-size:13px">點右上角「+ 新增訂單」開始</div>
      </div>
      <div id="order-content" style="display:none">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
          <span style="font-size:16px;font-weight:500" id="order-title"></span>
          <span style="font-size:13px;color:#f59e0b" id="order-deadline"></span>
        </div>
        <div class="payer-box">
          <div style="width:28px;height:28px;border-radius:50%;background:#B5D4F4;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:#0C447C;flex-shrink:0"></div>
          <div>
            <div style="font-size:13px;font-weight:500;color:#0C447C">本次付款人：<span id="payer-name"></span></div>
            <div style="font-size:12px;color:#185FA5;margin-top:1px">訂單結束後，請將餐費交給 <span id="payer-name2"></span></div>
          </div>
        </div>
        <div class="hint-box" id="order-hint-box" style="display:none">
          <span style="font-size:16px">📝</span>
          <div>
            <div style="font-size:12px;font-weight:500;color:#856404;margin-bottom:2px">點餐提醒</div>
            <div style="font-size:13px;color:#856404" id="order-hint-text"></div>
          </div>
        </div>
        <div class="grid2">
          <div>
            <div class="card">
              <div class="sec-title">菜單</div>
              <div id="menu-list"></div>
            </div>
            <div class="card">
              <div class="sec-title">已訂同事</div>
              <div id="entries-list"></div>
            </div>
          </div>
          <div>
            <div class="card" style="position:sticky;top:1rem">
              <div class="sec-title">我的訂單</div>
              <div class="input-group"><label class="lbl">你的名字</label><input class="inp" id="my-name" placeholder="輸入名字" oninput="updateMyTotal()"></div>
              <div id="my-summary" style="font-size:13px;color:#bbb;padding:.5rem 0">尚未選擇品項</div>
              <div class="input-group" style="margin-top:.75rem"><label class="lbl">備注</label><textarea class="inp" id="my-note" rows="2" placeholder="例：不要香菜" style="resize:none"></textarea></div>
              <div class="total-row"><span>小計</span><span id="my-total">$0</span></div>
              <button class="btn-primary" id="submit-btn" disabled onclick="submitOrder()">送出訂單</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="tab-pane" id="tab-accounts">
    <div class="stats">
      <div class="stat"><div class="stat-l">總消費</div><div class="stat-v" id="stat-spent">$0</div></div>
      <div class="stat"><div class="stat-l">未結清</div><div class="stat-v" id="stat-unpaid" style="color:#dc2626">$0</div></div>
      <div class="stat"><div class="stat-l">訂單數</div><div class="stat-v" id="stat-orders">0</div></div>
    </div>
    <div class="card"><div class="sec-title">個人總覽</div><div id="people-list"></div></div>
    <div class="card"><div class="sec-title">未結清明細</div><div id="unpaid-list"></div></div>
  </div>

  <div class="tab-pane" id="tab-history">
    <div class="card"><div class="sec-title">訂單記錄</div><div id="history-list"></div></div>
  </div>

  <div class="tab-pane" id="tab-stores">
    <div class="card"><div class="sec-title">店家列表</div><div id="stores-list"></div></div>
    <button class="btn-sm" onclick="showNewStore(true)">+ 新增店家</button>
    <div id="new-store-form" style="display:none;margin-top:1rem" class="card">
      <div style="font-size:14px;font-weight:500;margin-bottom:1rem">新增店家</div>
      <div class="input-group"><label class="lbl">店家名稱</label><input class="inp" id="ns-name" placeholder="例：鮮茶道" style="max-width:300px"></div>
      <div class="input-group"><label class="lbl">外送門檻</label><input class="inp" id="ns-threshold" type="number" placeholder="無門檻留空" style="max-width:150px"></div>
      <div class="input-group"><label class="lbl">備注</label><input class="inp" id="ns-note" placeholder="例：需提前預訂" style="max-width:300px"></div>
      <div class="input-group"><label class="lbl">點餐提醒</label><input class="inp" id="ns-order-hint" placeholder="例：白飯或紫米可選，可加辣蘿蔔" style="max-width:400px"><div style="font-size:12px;color:#aaa;margin-top:4px">同事訂餐時會看到這個提示</div></div>
      <div class="input-group"><label class="lbl">菜單品項</label><div id="new-store-items"></div><button class="btn-sm" style="margin-top:4px" onclick="addNewStoreRow()">+ 新增品項</button></div>
      <div style="display:flex;gap:8px;margin-top:.5rem">
        <button onclick="saveNewStore()" style="padding:9px 16px;border:none;border-radius:8px;background:#1a1a1a;color:#fff;font-size:14px;cursor:pointer">儲存店家</button>
        <button class="btn-sm" onclick="showNewStore(false)">取消</button>
      </div>
    </div>
  </div>
</div>

<!-- 編輯店家 Modal -->
<div class="modal-overlay" id="edit-store-modal" onclick="if(event.target===this)closeStoreEdit()">
  <div class="modal">
    <div class="modal-title">編輯店家</div>
    <input type="hidden" id="edit-store-id">
    <div class="input-group"><label class="lbl">店家名稱</label><input class="inp" id="edit-store-name"></div>
    <div class="input-group"><label class="lbl">外送門檻</label><input class="inp" id="edit-threshold" type="number" placeholder="無門檻留空" style="max-width:150px"></div>
    <div class="input-group"><label class="lbl">備注</label><input class="inp" id="edit-note" placeholder="例：需提前預訂"></div>
    <div class="input-group">
      <label class="lbl">點餐提醒</label>
      <input class="inp" id="edit-order-hint" placeholder="例：白飯或紫米可選，可加辣蘿蔔">
      <div style="font-size:12px;color:#aaa;margin-top:4px">同事訂餐時會看到這個提示</div>
    </div>
    <div class="input-group">
      <label class="lbl">菜單品項</label>
      <div id="edit-menu-items"></div>
      <button class="btn-sm" style="margin-top:4px" onclick="addEditMenuRow()">+ 新增品項</button>
    </div>
    <div style="display:flex;gap:8px;margin-top:.5rem">
      <button onclick="saveStoreEdit()" style="padding:9px 16px;border:none;border-radius:8px;background:#1a1a1a;color:#fff;font-size:14px;cursor:pointer">儲存</button>
      <button class="btn-sm" onclick="closeStoreEdit()">取消</button>
    </div>
  </div>
</div>
</body>
</html>
