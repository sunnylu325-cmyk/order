<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>訂餐系統</title>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, onSnapshot, query, orderBy, where, getDoc } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';

const app = initializeApp({
  apiKey: "AIzaSyA_tFbY1Cshh-u2qum2fg3fWijfHtYwBE0",
  authDomain: "order-e395c.firebaseapp.com",
  projectId: "order-e395c",
  storageBucket: "order-e395c.firebasestorage.app",
  messagingSenderId: "77302517511",
  appId: "1:77302517511:web:2248241cbad0bb999cbfa2"
});
const db = getFirestore(app);

let currentOrder = null;
let unsub = null;

function $(id){ return document.getElementById(id); }
function saveLocal(k,v){ localStorage.setItem(k,v); }
function loadLocal(k){ return localStorage.getItem(k)||''; }

// ── 初始化 ──
async function init(){
  $('today-date').textContent = new Date().toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
  $('new-deadline').value = new Date().toISOString().slice(0,16);
  const savedName = loadLocal('myName');
  if(savedName) $('my-name').value = savedName;
  showPage('list');
  loadTodayOrders();
}

// ── 頁面切換 ──
function showPage(page, order){
  document.querySelectorAll('.page').forEach(p => p.classList.toggle('active', p.id === 'page-' + page));
  if(page === 'order' && order){
    currentOrder = order;
    subscribeOrder();
    renderOrderPage();
  }
  if(page === 'list') loadTodayOrders();
  if(page === 'accounts') loadAccounts();
  if(page === 'history') loadHistory();
  if(page === 'stores') loadStores();
}

function showTab(tab){
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.tab-page').forEach(p => p.classList.toggle('active', p.id === 'tabp-' + tab));
  if(tab === 'today') loadTodayOrders();
  if(tab === 'accounts') loadAccounts();
  if(tab === 'history') loadHistory();
  if(tab === 'stores') loadStores();
}

// ── 今日訂單列表 ──
async function loadTodayOrders(){
  const today = new Date().toISOString().slice(0,10);
  const snap = await getDocs(query(collection(db,'orders'), orderBy('createdAt','desc')));
  const orders = snap.docs.map(d=>({id:d.id,...d.data()}))
    .filter(o => o.status === 'open' && o.createdAt?.slice(0,10) === today);

  const list = $('today-list');
  if(orders.length === 0){
    list.innerHTML = `<div style="text-align:center;padding:3rem;color:#888">
      <div style="font-size:16px;margin-bottom:8px">今天還沒有訂單</div>
      <div style="font-size:13px">點右上角「+ 新增訂單」發起</div>
    </div>`;
    return;
  }
  list.innerHTML = orders.map(o => {
    const total = o.entries.reduce((s,e)=>s+e.total,0);
    const deadline = o.deadline ? o.deadline.replace('T',' ') : '';
    return `<div class="order-card" onclick="enterOrder('${o.id}')">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div style="font-size:16px;font-weight:500">${o.storeName}</div>
          <div style="font-size:12px;color:#888;margin-top:4px">發起人：${o.payer}・截止 ${deadline}</div>
          <div style="margin-top:5px"><span style="background:#f0f0f0;border-radius:20px;padding:2px 10px;font-size:12px;color:#555">${o.mealType||'午餐'}</span></div>
        </div>
        <div style="text-align:right;flex-shrink:0;margin-left:12px">
          <span class="badge b-info">訂購中</span>
          <div style="font-size:12px;color:#888;margin-top:4px">${o.entries.length} 人已訂</div>
        </div>
      </div>
      ${o.entries.length > 0 ? `<div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap">
        ${o.entries.map(e=>`<span style="background:#f5f5f5;border-radius:20px;padding:3px 10px;font-size:12px;color:#555">${e.name}</span>`).join('')}
      </div>` : ''}
      <div style="margin-top:10px;font-size:13px;color:#aaa;display:flex;justify-content:space-between">
        <span>${o.menuItems.map(m=>m.name).slice(0,3).join('、')}${o.menuItems.length>3?'…':''}</span>
        <span style="color:#1a1a1a;font-weight:500">共 $${total}</span>
      </div>
    </div>`;
  }).join('');
}

async function enterOrder(id){
  const snap = await getDoc(doc(db,'orders',id));
  if(!snap.exists()) return;
  const order = { id: snap.id, ...snap.data() };
  showPage('order', order);
}

// ── 新增訂單 ──
async function loadStoreButtons(){
  const snap = await getDocs(collection(db, 'stores'));
  const wrap = $('store-btns');
  wrap.innerHTML = '';
  snap.docs.forEach(d => {
    const s = d.data();
    const btn = document.createElement('button');
    btn.className = 'btn-sm';
    btn.textContent = s.name;
    btn.onclick = () => loadStoreToForm(s);
    wrap.appendChild(btn);
  });
}

function loadStoreToForm(s){
  $('new-store-name').value = s.name;
  const container = $('new-menu-items');
  container.innerHTML = '';
  s.menuItems.forEach(m => addMenuRow(m.name, m.price));
}

function addMenuRow(name='', price=''){
  const div = document.createElement('div');
  div.className = 'menu-row';
  div.innerHTML = `<input class="inp" placeholder="品項名稱" value="${name}"><input class="inp price-inp" placeholder="價格" type="number" value="${price}"><button class="btn-sm" onclick="this.parentNode.remove()">刪除</button>`;
  $('new-menu-items').appendChild(div);
}

async function createOrder(){
  const storeName = $('new-store-name').value.trim();
  const mealType = document.querySelector('input[name="meal-type"]:checked')?.value || '午餐';
  const deadline = $('new-deadline').value;
  const payer = $('new-payer').value.trim();
  const mealType = $('new-meal-type').value || '午餐';
  const orderDate = new Date().toLocaleDateString('zh-TW',{month:'long',day:'numeric'});
  const rows = document.querySelectorAll('#new-menu-items .menu-row');
  const menuItems = [];
  rows.forEach(r => {
    const name = r.querySelector('input').value.trim();
    const price = Number(r.querySelector('.price-inp').value);
    if(name && price) menuItems.push({ name, price });
  });
  if(!storeName || !payer) return alert('請填寫店家名稱和付款人');
  if(menuItems.length === 0) return alert('請至少新增一個菜單品項');
  $('create-btn').textContent = '建立中...';
  $('create-btn').disabled = true;

  const storeSnap = await getDocs(collection(db,'stores'));
  let orderHint = '';
  storeSnap.docs.forEach(d => {
    const s = d.data();
    if(s.name === storeName && s.orderHint) orderHint = s.orderHint;
  });

  const ref = await addDoc(collection(db,'orders'), {
    storeName, mealType, deadline, payer, menuItems, orderHint,
    status: 'open', createdAt: new Date().toISOString(), entries: []
  });
  $('create-btn').textContent = '建立訂單';
  $('create-btn').disabled = false;

  // 清空表單
  $('new-store-name').value=''; $('new-payer').value=''; $('new-menu-items').innerHTML='';

  const order = { id: ref.id, storeName, mealType, deadline, payer, menuItems, orderHint, status:'open', entries:[] };
  showTab('today');
  showPage('order', order);
}

// ── 點餐頁面 ──
function subscribeOrder(){
  if(unsub) unsub();
  if(!currentOrder) return;
  unsub = onSnapshot(doc(db,'orders',currentOrder.id), snap => {
    if(snap.exists()){
      currentOrder = { id: snap.id, ...snap.data() };
      renderOrderPage();
    }
  });
}

const myQty = {};

function renderOrderPage(){
  if(!currentOrder) return;
  const mealLabel = currentOrder.mealType ? ' ・' + currentOrder.mealType : '';
  $('order-store-name').textContent = currentOrder.storeName + mealLabel;
  $('order-deadline').textContent = '截止：' + (currentOrder.deadline||'').replace('T',' ');
  $('payer-name').textContent = currentOrder.payer;
  $('payer-name2').textContent = currentOrder.payer;

  const hintBox = $('order-hint-box');
  if(currentOrder.orderHint){
    hintBox.style.display='flex';
    $('order-hint-text').textContent = currentOrder.orderHint;
  } else {
    hintBox.style.display='none';
  }

  // 菜單
  const menu = $('menu-list');
  menu.innerHTML = '';
  currentOrder.menuItems.forEach(item => {
    const key = item.name.replace(/[^a-zA-Z0-9]/g,'_');
    const div = document.createElement('div');
    div.className = 'menu-item';
    div.innerHTML = `<span>${item.name}</span>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="price-label">$${item.price}</span>
        <button class="qb" onclick="chg('${item.name}',-1)">−</button>
        <span id="q-${key}">${myQty[item.name]||0}</span>
        <button class="qb" onclick="chg('${item.name}',1)">+</button>
      </div>`;
    menu.appendChild(div);
  });

  // 已訂列表
  const entries = $('entries-list');
  entries.innerHTML = '';
  if(currentOrder.entries.length === 0){
    entries.innerHTML = '<div style="color:#bbb;font-size:13px;padding:.5rem 0">還沒有人訂餐</div>';
  } else {
    currentOrder.entries.forEach((e,i) => {
      const div = document.createElement('div');
      div.className = 'person-row';
      div.innerHTML = `<div class="av">${e.name[0]}</div>
        <div style="flex:1">
          <div class="name-text">${e.name}</div>
          <div class="sub-text">${e.items.map(it=>`${it.name} x${it.qty}`).join('、')} → $${e.total}${e.note?' ・'+e.note:''}</div>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <span class="badge ${e.paid?'b-ok':'b-warn'}">${e.paid?'已付':'未付'}</span>
          <button class="btn-sm" style="font-size:11px;padding:3px 7px;color:#dc2626;border-color:#fca5a5" onclick="deleteEntry(${i})">刪</button>
        </div>`;
      entries.appendChild(div);
    });
  }

  // 訂單彙整
  const summaryEl = $('order-summary-list');
  if(currentOrder.entries.length === 0){
    summaryEl.innerHTML = '<div style="color:#bbb;font-size:13px;padding:.5rem 0">尚無訂單</div>';
  } else {
    const summaryMap = {};
    currentOrder.entries.forEach(e => {
      e.items.forEach(it => {
        const key = e.note ? it.name + '__' + e.note : it.name;
        if(!summaryMap[key]) summaryMap[key] = { name: it.name, note: e.note||'', qty: 0, price: it.price };
        summaryMap[key].qty += it.qty;
      });
    });
    const totalItems = Object.values(summaryMap).reduce((s,v)=>s+v.qty,0);
    const grandTotal = currentOrder.entries.reduce((s,e)=>s+e.total,0);
    summaryEl.innerHTML = Object.entries(summaryMap).map(([key,v])=>
      '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f5f5f5">' +
        '<div><span style="font-size:14px;font-weight:500">' + v.name + '</span>' +
        (v.note ? '<span style="font-size:12px;color:#f59e0b;margin-left:6px">備注：' + v.note + '</span>' : '') +
        '</div><div style="display:flex;align-items:center;gap:12px">' +
        '<span style="font-size:13px;color:#888">x ' + v.qty + '</span>' +
        '<span style="font-size:14px;font-weight:500">$' + (v.price*v.qty) + '</span></div></div>'
    ).join('') +
    '<div style="display:flex;justify-content:space-between;font-size:15px;font-weight:500;padding:10px 0 0;border-top:1px solid #eee;margin-top:4px">' +
    '<span>共 ' + totalItems + ' 份</span><span>$' + grandTotal + '</span></div>';
  }

  // 還原我的名字選項
  const myName = $('my-name').value.trim();
  if(myName){
    const myEntry = currentOrder.entries.find(e=>e.name===myName);
    if(myEntry){
      $('submit-btn').textContent = '更新訂單';
      $('my-note').value = myEntry.note||'';
      myEntry.items.forEach(it=>{
        myQty[it.name]=it.qty;
        const key=it.name.replace(/[^a-zA-Z0-9]/g,'_');
        const el=document.getElementById('q-'+key);
        if(el) el.textContent=it.qty;
      });
    }
  }
  updateMyTotal();
}

function chg(name, delta){
  myQty[name] = Math.max(0,(myQty[name]||0)+delta);
  const key = name.replace(/[^a-zA-Z0-9]/g,'_');
  const el = document.getElementById('q-'+key);
  if(el) el.textContent = myQty[name];
  updateMyTotal();
}

function updateMyTotal(){
  if(!currentOrder) return;
  const items = Object.entries(myQty).filter(([,v])=>v>0);
  const total = items.reduce((s,[n,v])=>{
    const item = currentOrder.menuItems.find(m=>m.name===n);
    return s+(item?item.price*v:0);
  },0);
  $('my-total').textContent='$'+total;
  const summary=$('my-summary');
  summary.innerHTML = items.length===0
    ? '<span style="color:#bbb">尚未選擇品項</span>'
    : items.map(([n,v])=>{
        const item=currentOrder.menuItems.find(m=>m.name===n);
        return `<div class="summary-row"><span>${n} x${v}</span><span>$${item?item.price*v:0}</span></div>`;
      }).join('');
  const name=$('my-name').value.trim();
  $('submit-btn').disabled=items.length===0||!name;
}

async function submitOrder(){
  const name=$('my-name').value.trim();
  if(!name) return alert('請輸入名字');
  saveLocal('myName',name);
  const items=Object.entries(myQty).filter(([,v])=>v>0).map(([n,v])=>{
    const item=currentOrder.menuItems.find(m=>m.name===n);
    return {name:n,qty:v,price:item.price};
  });
  if(items.length===0) return alert('請選擇品項');
  const total=items.reduce((s,it)=>s+it.price*it.qty,0);
  const entry={name,items,note:$('my-note').value,total,paid:false,createdAt:new Date().toISOString()};
  const existingIndex=currentOrder.entries.findIndex(e=>e.name===name);
  let updatedEntries;
  if(existingIndex>=0){
    updatedEntries=[...currentOrder.entries];
    updatedEntries[existingIndex]=entry;
  } else {
    updatedEntries=[...currentOrder.entries,entry];
  }
  await updateDoc(doc(db,'orders',currentOrder.id),{entries:updatedEntries});
  $('submit-btn').textContent='已送出！';
  setTimeout(()=>{ $('submit-btn').textContent='更新訂單'; },2000);
}

async function deleteEntry(index){
  if(!confirm('確定要刪除這筆訂單？')) return;
  const updatedEntries=currentOrder.entries.filter((_,i)=>i!==index);
  await updateDoc(doc(db,'orders',currentOrder.id),{entries:updatedEntries});
}

async function closeOrder(){
  if(!currentOrder) return;
  if(!confirm('確定關閉訂單？關閉後將無法新增或修改訂餐。')) return;
  await updateDoc(doc(db,'orders',currentOrder.id),{status:'closed'});
  if(unsub) unsub();
  currentOrder=null;
  showPage('list');
}

function openDeleteModal(){
  if(!currentOrder) return;
  $('delete-confirm-input').value='';
  $('delete-payer-input').value='';
  $('delete-error').textContent='';
  $('delete-order-name').textContent=currentOrder.storeName;
  $('delete-order-payer').textContent=currentOrder.payer;
  $('delete-order-modal').style.display='flex';
}

function closeDeleteModal(){
  $('delete-order-modal').style.display='none';
}

async function confirmDeleteOrder(){
  const payerInput=$('delete-payer-input').value.trim();
  const confirmText=$('delete-confirm-input').value.trim();
  const errorEl=$('delete-error');
  if(payerInput!==currentOrder.payer){ errorEl.textContent='付款人姓名不正確'; return; }
  if(confirmText!=='確認刪除'){ errorEl.textContent='請輸入「確認刪除」四個字'; return; }
  await deleteDoc(doc(db,'orders',currentOrder.id));
  if(unsub) unsub();
  currentOrder=null;
  closeDeleteModal();
  showPage('list');
}

// ── 帳務 ──
async function loadAccounts(){
  const snap=await getDocs(collection(db,'orders'));
  const orders=snap.docs.map(d=>({id:d.id,...d.data()}));
  const allEntries=orders.flatMap(o=>o.entries.map((e,i)=>({...e,orderId:o.id,entryIndex:i,storeName:o.storeName,payer:o.payer,date:o.createdAt?.slice(0,10)})));
  const people={};
  allEntries.forEach(e=>{
    if(!people[e.name]) people[e.name]={total:0,unpaid:0};
    people[e.name].total+=e.total;
    if(!e.paid) people[e.name].unpaid+=e.total;
  });
  const totalSpent=Object.values(people).reduce((s,p)=>s+p.total,0);
  const totalUnpaid=Object.values(people).reduce((s,p)=>s+p.unpaid,0);
  $('stat-spent').textContent='$'+totalSpent;
  $('stat-unpaid').textContent='$'+totalUnpaid;
  $('stat-orders').textContent=orders.length;
  $('people-list').innerHTML=Object.entries(people).map(([name,p])=>`
    <div class="person-row">
      <div class="av">${name[0]}</div>
      <div style="flex:1"><div class="name-text">${name}</div><div class="sub-text">累積 $${p.total}・未付 $${p.unpaid}</div></div>
      ${p.unpaid===0?'<span class="badge b-ok">結清</span>':`<span class="tag-debt">欠款 $${p.unpaid}</span>`}
    </div>`).join('')||'<div style="color:#bbb;font-size:13px">尚無資料</div>';
  const unpaid=allEntries.filter(e=>!e.paid);
  $('unpaid-list').innerHTML=unpaid.length===0?'<div style="color:#bbb;font-size:13px">所有人都已結清</div>':
    unpaid.map(e=>`<div class="settle-row">
      <div><div style="font-size:14px">${e.name} 欠 ${e.payer}</div><div class="sub-text">${e.date} ${e.storeName}</div></div>
      <div style="text-align:right"><div style="font-weight:500">$${e.total}</div>
        <button class="btn-sm" style="margin-top:4px" onclick="markPaid('${e.orderId}',${e.entryIndex})">標記已還</button>
      </div>
    </div>`).join('');
}

async function markPaid(orderId,entryIndex){
  const snap=await getDoc(doc(db,'orders',orderId));
  if(!snap.exists()) return;
  const entries=[...snap.data().entries];
  entries[entryIndex]={...entries[entryIndex],paid:true};
  await updateDoc(doc(db,'orders',orderId),{entries});
  loadAccounts();
}

// ── 歷史 ──
async function loadHistory(){
  const snap=await getDocs(query(collection(db,'orders'),orderBy('createdAt','desc')));
  const orders=snap.docs.map(d=>({id:d.id,...d.data()})).filter(o=>o.status==='closed');
  $('history-list').innerHTML=orders.length===0?'<div style="color:#bbb;font-size:13px">尚無已結束的訂單</div>':
    orders.map(o=>{
      const total=o.entries.reduce((s,e)=>s+e.total,0);
      const allPaid=o.entries.length>0&&o.entries.every(e=>e.paid);
      const statusLabel=allPaid?'已完成':'未結清';
      const statusClass=allPaid?'b-ok':'b-warn';
      return '<div class="order-hist">' +
        '<div><div style="font-weight:500">' + o.storeName + '</div>' +
        '<div class="sub-text">' + (o.createdAt?.slice(0,10)||'') + ' · ' + (o.mealType||'午餐') + ' · ' + o.entries.length + ' 人 · 付款人：' + o.payer + '</div></div>' +
        '<div style="text-align:right"><div style="font-weight:500">$' + total + '</div>' +
        '<span class="badge ' + statusClass + '" style="margin-top:4px;display:inline-block">' + statusLabel + '</span></div></div>';
    }).join('');
}

// ── 常用店家 ──
async function loadStores(){
  const snap=await getDocs(collection(db,'stores'));
  const stores=snap.docs.map(d=>({id:d.id,...d.data()}));
  $('stores-list').innerHTML=stores.length===0?'<div style="color:#bbb;font-size:13px;padding-bottom:1rem">尚無店家</div>':
    stores.map(s=>`<div class="store-item">
      <div style="display:flex;align-items:flex-start;gap:10px">
        <div style="flex:1">
          <div style="font-size:14px;font-weight:500">${s.name}</div>
          <div class="sub-text" style="margin-top:3px">${s.menuItems.map(m=>`${m.name} $${m.price}`).join('、')}</div>
          <div style="font-size:12px;margin-top:4px;color:#888">外送門檻：<strong style="color:#1a1a1a">${s.threshold?'$'+s.threshold:'無門檻'}</strong>${s.note?' ・'+s.note:''}</div>
          ${s.orderHint?`<div style="font-size:12px;margin-top:5px;background:#FFF3CD;color:#856404;padding:4px 8px;border-radius:6px;display:inline-block">點餐提醒：${s.orderHint}</div>`:''}
        </div>
        <button class="btn-sm" onclick="openStoreEdit('${s.id}')">編輯</button>
      </div>
    </div>`).join('');
}

async function openStoreEdit(id){
  const snap=await getDoc(doc(db,'stores',id));
  if(!snap.exists()) return;
  const s=snap.data();
  $('edit-store-id').value=id;
  $('edit-store-name').value=s.name;
  $('edit-threshold').value=s.threshold||'';
  $('edit-note').value=s.note||'';
  $('edit-order-hint').value=s.orderHint||'';
  const c=$('edit-menu-items');
  c.innerHTML='';
  s.menuItems.forEach(m=>{
    const div=document.createElement('div');
    div.className='menu-row';
    div.innerHTML=`<input class="inp" placeholder="品項名稱" value="${m.name}"><input class="inp price-inp" placeholder="價格" type="number" value="${m.price}"><button class="btn-sm" onclick="this.parentNode.remove()">刪除</button>`;
    c.appendChild(div);
  });
  $('edit-store-modal').style.display='flex';
}

function closeStoreEdit(){ $('edit-store-modal').style.display='none'; }

function addEditMenuRow(){
  const div=document.createElement('div');
  div.className='menu-row';
  div.innerHTML=`<input class="inp" placeholder="品項名稱"><input class="inp price-inp" placeholder="價格" type="number"><button class="btn-sm" onclick="this.parentNode.remove()">刪除</button>`;
  $('edit-menu-items').appendChild(div);
}

async function saveStoreEdit(){
  const id=$('edit-store-id').value;
  const name=$('edit-store-name').value.trim();
  if(!name) return alert('請輸入店家名稱');
  const rows=document.querySelectorAll('#edit-menu-items .menu-row');
  const menuItems=[];
  rows.forEach(r=>{
    const n=r.querySelector('input').value.trim();
    const p=Number(r.querySelector('.price-inp').value);
    if(n&&p) menuItems.push({name:n,price:p});
  });
  if(menuItems.length===0) return alert('請至少新增一個品項');
  await updateDoc(doc(db,'stores',id),{name,threshold:Number($('edit-threshold').value)||null,note:$('edit-note').value,orderHint:$('edit-order-hint').value,menuItems});
  closeStoreEdit();
  loadStores();
}

function showNewStore(show){ $('new-store-form').style.display=show?'block':'none'; }

function addNewStoreRow(){
  const div=document.createElement('div');
  div.className='menu-row';
  div.innerHTML=`<input class="inp" placeholder="品項名稱"><input class="inp price-inp" placeholder="價格" type="number"><button class="btn-sm" onclick="this.parentNode.remove()">刪除</button>`;
  $('new-store-items').appendChild(div);
}

async function saveNewStore(){
  const name=$('ns-name').value.trim();
  if(!name) return alert('請輸入店家名稱');
  const rows=document.querySelectorAll('#new-store-items .menu-row');
  const menuItems=[];
  rows.forEach(r=>{
    const n=r.querySelector('input').value.trim();
    const p=Number(r.querySelector('.price-inp').value);
    if(n&&p) menuItems.push({name:n,price:p});
  });
  if(menuItems.length===0) return alert('請至少新增一個品項');
  await addDoc(collection(db,'stores'),{name,threshold:Number($('ns-threshold').value)||null,note:$('ns-note').value,orderHint:$('ns-order-hint').value,menuItems});
  $('ns-name').value='';$('ns-threshold').value='';$('ns-note').value='';$('ns-order-hint').value='';
  $('new-store-items').innerHTML='';
  showNewStore(false);
  loadStores();
}

// ── 新增訂單頁 ──
function goNewOrder(){
  showPage('new-order');
  $('new-deadline').value=new Date().toISOString().slice(0,16);
  loadStoreButtons();
}

function selectMealType(btn){
  document.querySelectorAll('.meal-type-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  $('new-meal-type').value = btn.dataset.val;
}
window.selectMealType=selectMealType;
window.showTab=showTab; window.showPage=showPage; window.enterOrder=enterOrder;
window.goNewOrder=goNewOrder; window.addMenuRow=addMenuRow; window.createOrder=createOrder;
window.chg=chg; window.updateMyTotal=updateMyTotal; window.submitOrder=submitOrder;
window.deleteEntry=deleteEntry; window.closeOrder=closeOrder;
window.openDeleteModal=openDeleteModal; window.closeDeleteModal=closeDeleteModal; window.confirmDeleteOrder=confirmDeleteOrder;
window.markPaid=markPaid;
window.openStoreEdit=openStoreEdit; window.closeStoreEdit=closeStoreEdit; window.addEditMenuRow=addEditMenuRow; window.saveStoreEdit=saveStoreEdit;
window.showNewStore=showNewStore; window.addNewStoreRow=addNewStoreRow; window.saveNewStore=saveNewStore;

document.addEventListener('DOMContentLoaded', init);
</script>

      <input class="inp" id="delete-payer-input" placeholder="輸入付款人姓名">
    </div>
    <div class="input-group">
      <label class="lbl">請輸入「確認刪除」四個字</label>
      <input class="inp" id="delete-confirm-input" placeholder="確認刪除">
    </div>
    <div id="delete-error" style="font-size:13px;color:#dc2626;margin-bottom:.75rem;min-height:18px"></div>
    <div style="display:flex;gap:8px">
      <button onclick="confirmDeleteOrder()" style="padding:9px 16px;border:none;border-radius:8px;background:#dc2626;color:#fff;font-size:14px;cursor:pointer">確認刪除</button>
      <button class="btn-sm" onclick="closeDeleteModal()">取消</button>
    </div>
  </div>
</div>
</body>
</html>
