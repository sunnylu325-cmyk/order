<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>訂餐系統</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:#1a1a1a;background:#f5f5f5}
.container{max-width:800px;margin:0 auto;padding:1rem}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem}
.header-title{font-size:20px;font-weight:500}
.header-date{font-size:13px;color:#888;margin-top:2px}
.tabs{display:flex;border-bottom:1px solid #eee;margin-bottom:1.5rem;background:#fff;border-radius:12px 12px 0 0;padding:0 .5rem}
.tab-btn{padding:12px 18px;border:none;background:none;cursor:pointer;font-size:14px;color:#888;border-bottom:2px solid transparent}
.tab-btn.active{color:#1a1a1a;border-bottom-color:#1a1a1a;font-weight:500}
.tab-page{display:none}.tab-page.active{display:block}
.page{display:none}.page.active{display:block}
.card{background:#fff;border:1px solid #eee;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem}
.order-card{background:#fff;border:1px solid #eee;border-radius:12px;padding:1rem 1.25rem;margin-bottom:.75rem;cursor:pointer;transition:border-color .15s}
.order-card:hover{border-color:#999}
.sec-title{font-size:12px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.75rem}
.btn-sm{padding:6px 12px;border:1px solid #ddd;border-radius:8px;background:none;font-size:13px;cursor:pointer}
.btn-sm:hover{background:#f5f5f5}
.btn-primary{padding:10px 16px;border:none;border-radius:8px;background:#1a1a1a;color:#fff;font-size:14px;font-weight:500;cursor:pointer;width:100%;margin-top:10px}
.btn-primary:hover{opacity:.85}
.btn-primary:disabled{opacity:.35;cursor:default}
.inp{padding:8px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px;width:100%}
.inp:focus{outline:none;border-color:#999}
.lbl{font-size:13px;color:#888;display:block;margin-bottom:4px}
.input-group{margin-bottom:.75rem}
.badge{display:inline-block;padding:3px 9px;border-radius:8px;font-size:12px;font-weight:500}
.b-ok{background:#EAF3DE;color:#27500A}
.b-warn{background:#FFF3CD;color:#856404}
.b-info{background:#E6F1FB;color:#0C447C}
.tag-debt{display:inline-block;padding:2px 8px;border-radius:8px;font-size:11px;background:#FCEBEB;color:#791F1F}
.person-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f5f5f5}
.person-row:last-child{border-bottom:none}
.av{width:32px;height:32px;border-radius:50%;background:#EEEDFE;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:#3C3489;flex-shrink:0}
.name-text{font-size:14px;font-weight:500}
.sub-text{font-size:12px;color:#888;margin-top:2px}
.menu-item{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid #f5f5f5}
.menu-item:last-child{border-bottom:none}
.price-label{font-size:13px;color:#888}
.qb{width:26px;height:26px;border-radius:50%;border:1px solid #ddd;background:none;cursor:pointer;font-size:15px}
.qb:hover{background:#f5f5f5}
.grid2{display:grid;grid-template-columns:1fr 260px;gap:1rem}
.summary-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f5f5f5;font-size:13px}
.total-row{display:flex;justify-content:space-between;font-size:15px;font-weight:500;padding:10px 0 0;border-top:1px solid #eee;margin-top:6px}
.payer-box{background:#E6F1FB;border:1px solid #B5D4F4;border-radius:8px;padding:10px 14px;margin-bottom:1rem;display:flex;align-items:center;gap:10px}
.hint-box{background:#FFF3CD;border:1px solid #fde68a;border-radius:8px;padding:10px 14px;margin-bottom:1rem;display:flex;align-items:flex-start;gap:8px}
.stats{display:flex;gap:12px;margin-bottom:1.25rem}
.stat{background:#f5f5f5;border-radius:8px;padding:1rem;flex:1}
.stat-l{font-size:12px;color:#888;margin-bottom:4px}
.stat-v{font-size:22px;font-weight:500}
.settle-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #f5f5f5}
.settle-row:last-child{border-bottom:none}
.order-hist{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid #f5f5f5}
.order-hist:last-child{border-bottom:none}
.store-item{padding:12px 0;border-bottom:1px solid #f5f5f5}
.store-item:last-child{border-bottom:none}
.menu-row{display:flex;gap:8px;margin-bottom:8px}
.back-btn{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.45);z-index:100;align-items:center;justify-content:center;padding:1rem}
.modal{background:#fff;border-radius:16px;padding:1.5rem;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:500;margin-bottom:1.25rem}
.meal-tag{background:#f0f0f0;border-radius:20px;padding:2px 10px;font-size:12px;color:#555}
.meal-type-btn{padding:6px 14px;border:1px solid #ddd;border-radius:20px;background:none;font-size:13px;cursor:pointer;color:#888}
.meal-type-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
@media(max-width:600px){.grid2{grid-template-columns:1fr}.stats{flex-wrap:wrap}}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <div class="header-title">訂餐系統</div>
      <div class="header-date" id="today-date"></div>
    </div>
    <button class="btn-sm" id="new-order-btn">+ 新增訂單</button>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="today">今日訂單</button>
    <button class="tab-btn" data-tab="accounts">帳務總覽</button>
    <button class="tab-btn" data-tab="history">歷史記錄</button>
    <button class="tab-btn" data-tab="stores">常用店家</button>
  </div>

  <!-- 主頁面（含tab） -->

  <div class="page active" id="page-list">
    <div class="tab-page active" id="tabp-today">
      <div id="today-list"></div>
    </div>
    <div class="tab-page" id="tabp-accounts">
      <div class="stats">
        <div class="stat"><div class="stat-l">總消費</div><div class="stat-v" id="stat-spent">$0</div></div>
        <div class="stat"><div class="stat-l">未結清</div><div class="stat-v" id="stat-unpaid" style="color:#dc2626">$0</div></div>
        <div class="stat"><div class="stat-l">訂單數</div><div class="stat-v" id="stat-orders">0</div></div>
      </div>
      <div class="card"><div class="sec-title">個人總覽</div><div id="people-list"></div></div>
      <div class="card"><div class="sec-title">未結清明細</div><div id="unpaid-list"></div></div>
    </div>
    <div class="tab-page" id="tabp-history">
      <div class="card"><div class="sec-title">訂單記錄</div><div id="history-list"></div></div>
    </div>
    <div class="tab-page" id="tabp-stores">
      <div class="card"><div class="sec-title">店家列表</div><div id="stores-list"></div></div>
      <button class="btn-sm" id="add-store-btn">+ 新增店家</button>
      <div id="new-store-form" style="display:none;margin-top:1rem" class="card">
        <div style="font-size:14px;font-weight:500;margin-bottom:1rem">新增店家</div>
        <div class="input-group"><label class="lbl">店家名稱</label><input class="inp" id="ns-name" placeholder="例：鮮茶道" style="max-width:300px"></div>
        <div class="input-group"><label class="lbl">外送門檻</label><input class="inp" id="ns-threshold" type="number" placeholder="無門檻留空" style="max-width:150px"></div>
        <div class="input-group"><label class="lbl">備注</label><input class="inp" id="ns-note" placeholder="例：需提前預訂" style="max-width:300px"></div>
        <div class="input-group"><label class="lbl">點餐提醒</label><input class="inp" id="ns-order-hint" placeholder="例：白飯或紫米可選，可加辣蘿蔔"><div style="font-size:12px;color:#aaa;margin-top:4px">同事訂餐時會看到這個提示</div></div>
        <div class="input-group"><label class="lbl">菜單品項</label><div id="new-store-items"></div><button class="btn-sm" id="add-store-item-btn" style="margin-top:4px">+ 新增品項</button></div>
        <div style="display:flex;gap:8px;margin-top:.5rem">
          <button id="save-new-store-btn" style="padding:9px 16px;border:none;border-radius:8px;background:#1a1a1a;color:#fff;font-size:14px;cursor:pointer">儲存店家</button>
          <button class="btn-sm" id="cancel-new-store-btn">取消</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 新增訂單頁 -->

  <div class="page" id="page-new-order">
    <div class="back-btn">
      <div style="display:flex;align-items:center;gap:8px">
        <button class="btn-sm" id="back-from-new-btn">← 返回</button>
        <span style="font-size:16px;font-weight:500">新增訂單</span>
      </div>
    </div>
    <div class="card">
      <div class="sec-title">店家資訊</div>
      <div class="input-group"><label class="lbl">訂單標題 <span style="color:#aaa;font-weight:400">（說明用途與日期，例：4/15 午餐、週五晚餐）</span></label><input class="inp" id="new-order-title" placeholder="例：4/15 午餐、週五晚餐團購"></div>
      <div class="input-group"><label class="lbl">店家名稱</label><input class="inp" id="new-store-name" placeholder="例：八方雲集"></div>
      <div class="input-group"><label class="lbl">截止時間</label><input class="inp" id="new-deadline" type="datetime-local" style="width:220px"></div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:.5rem">
        <span style="font-size:13px;color:#888">常用店家：</span>
        <div id="store-btns" style="display:flex;gap:6px;flex-wrap:wrap"></div>
      </div>
    </div>
    <div class="card">
      <div class="sec-title">付款人</div>
      <div class="input-group"><label class="lbl">這次誰去拿餐付錢？</label><input class="inp" id="new-payer" placeholder="輸入付款人姓名" style="max-width:240px"></div>
    </div>
    <div class="card">
      <div class="sec-title">菜單品項</div>
      <div id="new-menu-items"></div>
      <button class="btn-sm" id="add-menu-item-btn" style="margin-top:4px">+ 新增品項</button>
    </div>
    <button class="btn-sm" id="create-btn" style="padding:10px 20px;background:#1a1a1a;color:#fff
